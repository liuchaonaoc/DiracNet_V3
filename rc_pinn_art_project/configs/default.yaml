seed: 42

grid:
  r_min: 1.0e-4
  r_max: 50.0
  n_grid: 128
  scheme: loglinear

coords:
  c1: 1.0
  c2: 1.0
  r_eps: 1.0e-6
  learn_map: false

model:
  n_orb_max: 16
  n_csf_max: 8
  d_branch: 64
  d_trunk: 64
  n_siren_layers: 3
  omega_0: 15.0
  apply_lowdin: false

ci:
  enabled: false
  k_list: [0, 1, 2]
  M_max: 8
  eps_degen_ev: 1.0e-6
  racah_cache: data_cache/racah_cache_v3.npz
  diagonal_fill: hybrid

continuum:
  enabled: false

stage_a:
  n_epochs: 2000
  batch_size: 4
  weights:
    pde: 1.0
    ortho: 100.0
    asym: 0.1
    norm: 10.0
    v_prior: 5.0
    v_smooth: 1.0e-6
  gate:
    cos_threshold: 0.5
    pde_threshold: 1.0e-1
    e_orb_meV_threshold: 500.0

optimizer:
  lr_trunk: 3.0e-4
  lr_branch: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0

training:
  ckpt_dir: ./checkpoints/v3_default
  log_dir: ./logs/v3_default
  val_every_epochs: 10
  steps_per_epoch: 5

dataset:
  manifest: data_cache/manifest_hydrogenic_v3.parquet
  n_orb_max: 16
  n_csf_max: 8

stage_c:
  diagonal_fill: hybrid
  nist_inject: true
